services:
  app:
    build:
      context: .
      args:
        # CPU is the default. For NVIDIA GPUs use the overlay:
        #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
        LLAMA_IMAGE: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
        LIVEKIT_IMAGE: ${LIVEKIT_IMAGE:-livekit/livekit-server:latest}
        PYTHON_BASE: ${PYTHON_BASE:-python:3.11-slim}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    env_file:
      - .env
    environment:
      # No hardcoded default here: Config.from_env() computes the right
      # default itself (it depends on ENABLE_HTTPS — see config.py). Only
      # meant to be set when the operator wants an explicit override (e.g.
      # LiveKit Cloud); config.py reads it with `os.getenv(...) or default`
      # so a set-but-empty passthrough (the ${VAR:-} below, when unset in
      # .env) still falls through to that computed default.
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      # For browsers on another device (e.g. a tablet over Wi-Fi): the
      # LAN-reachable address handed to browsers, and the IP advertised in
      # WebRTC ICE candidates. Both default to loopback-only (same machine).
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-}
      LIVEKIT_NODE_IP: ${LIVEKIT_NODE_IP:-127.0.0.1}
      STT_PROVIDER: ${STT_PROVIDER:-nemotron}
      WAKE_WORD: ${WAKE_WORD:-}
      WAKE_WORD_THRESHOLD: ${WAKE_WORD_THRESHOLD:-0.5}
      LLAMA_HF_REPO: ${LLAMA_HF_REPO:-unsloth/gemma-4-E2B-it-qat-GGUF:UD-Q4_K_XL}
      LLAMA_OFFLINE: ${LLAMA_OFFLINE:-}
      LLAMA_MODEL_PATH: ${LLAMA_MODEL_PATH:-}
      LLAMA_MODEL: ${LLAMA_MODEL:-gemma-4-e2b}
      LLAMA_MODEL_ALIAS: ${LLAMA_MODEL_ALIAS:-gemma-4-e2b}
      LLAMA_CTX_SIZE: ${LLAMA_CTX_SIZE:-16384}
      LLAMA_N_GPU_LAYERS: ${LLAMA_N_GPU_LAYERS:-0}
      DEVICE: ${DEVICE:-cpu}
      # Telugu/Marathi TTS (Meta MMS) — off by default, extra model
      # downloads + RAM most deployments won't need.
      ENABLE_INDIC_TTS: ${ENABLE_INDIC_TTS:-}
      INDIC_TTS_BASE_URL: ${INDIC_TTS_BASE_URL:-}
      # Gates the parent settings panel (time limit, custom story/lesson).
      PARENT_PIN: ${PARENT_PIN:-1234}
      # HTTPS via Caddy (LAN-only local CA) — see README's "HTTPS" section.
      # When on, Caddy claims WEB_PORT/LIVEKIT_BIND_PORT for TLS and the
      # underlying processes move to internal-only ports; the RTC-over-TCP
      # fallback (LIVEKIT_RTC_PORT) is dropped from external publishing
      # below since it isn't needed once HTTPS/wss signaling works (a plain
      # UDP media path is normal for self-hosted LiveKit either way).
      ENABLE_HTTPS: ${ENABLE_HTTPS:-}
    ports:
      # Container-side must track WEB_PORT/LIVEKIT_BIND_PORT too: whichever
      # process ends up owning that number internally (Caddy when HTTPS is
      # on, the service itself otherwise) binds exactly that port.
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"
      - "${LIVEKIT_BIND_PORT:-7880}:${LIVEKIT_BIND_PORT:-7880}"
      # WebRTC media over UDP. The host port must equal the container port
      # because LiveKit advertises this exact port in its ICE candidates.
      # Can't be hidden behind Caddy — a reverse proxy doesn't carry WebRTC
      # media, only the HTTP/WS signaling above.
      - "${LIVEKIT_UDP_PORT:-7882}:7882/udp"
    volumes:
      - models:/models
      - caddy_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          if [ "$$ENABLE_HTTPS" = "1" ]; then
            curl -fsSk https://127.0.0.1:${WEB_PORT:-8080}/healthz > /dev/null;
          else
            curl -fsS http://127.0.0.1:${WEB_PORT:-8080}/healthz > /dev/null;
          fi
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  models:
  caddy_data:
